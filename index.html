<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CSS Image Layout Practice</title>
    <style>
        body {
            margin: 0;
            padding: 50px 0;
            display: flex;
            justify-content: center; /* 讓整組圖片在畫面水平置中 */
            align-items: center;
            min-height: 100vh;
            background-color: #f9f9f9;
        }

        /* 左右兩張照片的容器樣式 */
        .img-side {
            width: 33%;           /* 寬度 33% */
            height: 300px;        /* 高度 300px */
            display: block;
        }

        /* 左側圖片：圓角 18px，不變形 */
        .img-left {
            border-radius: 18px;
            object-fit: cover;    /* No distortion */
        }

        /* 右側圖片：變形（拉伸填充） */
        .img-right {
            object-fit: fill;     /* Distortion */
        }

        /* 中間圓形圖片樣式 */
        .img-middle {
            width: 150px;         /* 尺寸 150px */
            height: 150px;
            border-radius: 50%;   /* 圓形 */
            border: 1px solid #000;
            object-fit: cover;    /* No distortion */
            
            /* 重點：與左右兩邊各間距 150px */
            margin-left: 150px;
            margin-right: 150px;
            
            flex-shrink: 0;       /* 防止圓形圖片被壓縮 */
        }
    </style>
</head>
<body>

    <img src="https://picsum.photos/id/101/800/800" class="img-side img-left" alt="Left">

    <img src="https://picsum.photos/id/111/400/400" class="img-middle" alt="Middle">

    <img src="https://picsum.photos/id/101/800/800" class="img-side img-right" alt="Right">

</body>
</html>
