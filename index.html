<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CSS Image Styling</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f9f9f9;
        }

        /* 核心修正：限制容器最大寬度，並讓內容置中靠攏 */
        .wrapper {
            display: flex;
            align-items: center;
            justify-content: center; 
            width: 95%;
            max-width: 900px; /* 這裡控制整組圖片不要散開到全螢幕 */
            gap: 15px;        /* 這裡設定適中的小間距，對照題目視覺 */
        }

        /* 左右兩張：寬度 33%，高度 300px */
        .img-side {
            width: 33%;
            height: 300px;
            flex-shrink: 0;
        }

        /* 左側：圓角 18px，無變形 */
        .img-left {
            border-radius: 18px;
            object-fit: cover;
        }

        /* 右側：變形 (拉伸) */
        .img-right {
            object-fit: fill; /* 強制填充達成 Distortion */
        }

        /* 中間：圓形，150px，不同照片 */
        .img-middle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 1px solid #000;
            object-fit: cover;
            flex-shrink: 0; /* 防止圓形被擠壓 */
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="https://picsum.photos/id/101/800/800" class="img-side img-left" alt="Left">

        <img src="https://picsum.photos/id/111/400/400" class="img-middle" alt="Middle">

        <img src="https://picsum.photos/id/101/800/800" class="img-side img-right" alt="Right">
    </div>

</body>
</html>
