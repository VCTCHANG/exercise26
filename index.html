<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CSS Image Styling with Flip and No Distortion</title>
    <style>
        body {
            margin: 0;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f9f9f9;
        }

        /* 主容器，用於彈性佈局三個子元素 */
        .flex-wrapper {
            display: flex;
            width: 90%;
            max-width: 1200px;
            justify-content: space-between;
            align-items: center;
        }

        /* 圖片容器子元素 (用來定位並隱藏溢出) */
        .img-child-left,
        .img-child-right {
            width: 33%;           /* 尺寸要求 1：寬度 33% */
            height: 300px;        /* 尺寸要求 1：高度 300px */
            overflow: hidden;
            position: relative;
        }

        .img-child-middle {
            width: 150px;         /* 尺寸要求 2：寬度 150px (框) */
            height: 150px;        /* 正圓形框，高度也是 150px */
            overflow: hidden;
            position: relative;
        }

        /* 翻轉容器 (用於實現不會變扁的 3D flip) */
        .image-flip-box {
            width: 100%;
            height: 100%;
            perspective: 1000px; /* 重要：視角，確保翻轉時圖片在 3D 空間中不變扁 */
        }

        /* 圖片基本樣式 */
        .image-flip-box img {
            width: 100%;
            height: 100%;
            transition: transform 0.6s; /* 翻轉過渡時間 */
            backface-visibility: hidden; /* 防止翻轉時圖片變透明或閃爍 */
        }

        /* 要求：要有 flip (這裏設置為鼠標懸停 hover 時水平翻轉) */
        .image-flip-box:hover img {
            transform: rotateY(180deg); /* Y 軸旋轉 180 度，水平翻轉 */
        }

        /* 特定圖片樣式對照 */
        
        /* 左側圖片：radius 18px，no distortion */
        .img-left {
            border-radius: 18px; /* 要求：radius 18px */
            object-fit: cover;    /* 要求：no distortion (保持比例裁切填滿) */
        }

        /* 中間圖片：正圓形，border，no distortion */
        .img-middle {
            border-radius: 50%; /* 要求：圓形框 */
            border: 1px solid #000; /* 細黑邊框，對照圖片標註 border */
            object-fit: cover;    /* 要求：no distortion */
        }

        /* 右側圖片：height 300px，distortion */
        .img-right {
            object-fit: fill;     /* 要求：distortion (預設拉伸填充，導致變形) */
        }
    </style>
</head>
<body>
    <div class="flex-wrapper">
        <div class="img-child-left">
            <div class="image-flip-box">
                <img src="https://picsum.photos/id/101/800/800" class="img-left" alt="Left Eiffel Tower (No Distortion)">
            </div>
        </div>
        
        <div class="img-child-middle">
            <div class="image-flip-box">
                <img src="https://picsum.photos/id/111/150/150" class="img-middle" alt="Middle Landscape (No Distortion)">
            </div>
        </div>
        
        <div class="img-child-right">
            <div class="image-flip-box">
                <img src="https://picsum.photos/id/101/800/800" class="img-right" alt="Right Eiffel Tower (Distortion)">
            </div>
        </div>
    </div>
</body>
</html>
